openapi: 3.0.3
info:
  title: Premia API
  version: 0.1.0
  description: |
    Premia exposes normalized application-facing endpoints for portfolio,
    market data, watchlists, broker connections, and banking workflows.

    Design constraints:
    - Providers are implementation details behind these contracts.
    - Money and decimal values are encoded as strings.
    - Every response includes request metadata and freshness timestamps.
servers:
  - url: https://api.premia.local
    description: Local development
tags:
  - name: Bootstrap
  - name: Home
  - name: Account
  - name: Watchlists
  - name: Quotes
  - name: Charts
  - name: Options
  - name: Trading
  - name: Connections
  - name: Streaming
security:
  - bearerAuth: []
paths:
  /v1/bootstrap:
    get:
      tags: [Bootstrap]
      summary: Load app bootstrap state.
      operationId: getBootstrap
      responses:
        '200':
          description: App bootstrap payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/home:
    get:
      tags: [Home]
      summary: Load the home screen payload.
      operationId: getHomeScreen
      responses:
        '200':
          description: Home screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeScreenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/account:
    get:
      tags: [Account]
      summary: Load the account screen payload.
      operationId: getAccountScreen
      responses:
        '200':
          description: Account screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountScreenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/watchlists:
    get:
      tags: [Watchlists]
      summary: List watchlists.
      operationId: listWatchlists
      responses:
        '200':
          description: Watchlist summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Watchlists]
      summary: Create a watchlist.
      operationId: createWatchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWatchlistRequest'
      responses:
        '201':
          description: Watchlist created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/watchlists/{watchlistId}:
    get:
      tags: [Watchlists]
      summary: Load a watchlist screen.
      operationId: getWatchlistScreen
      parameters:
        - $ref: '#/components/parameters/WatchlistId'
      responses:
        '200':
          description: Watchlist screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistScreenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/watchlists/{watchlistId}:
    patch:
      tags: [Watchlists]
      summary: Update a watchlist.
      operationId: updateWatchlist
      parameters:
        - $ref: '#/components/parameters/WatchlistId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWatchlistRequest'
      responses:
        '200':
          description: Watchlist updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/watchlists/{watchlistId}/symbols:
    post:
      tags: [Watchlists]
      summary: Add a symbol to a watchlist.
      operationId: addWatchlistSymbol
      parameters:
        - $ref: '#/components/parameters/WatchlistId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWatchlistSymbolRequest'
      responses:
        '200':
          description: Watchlist updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/watchlists/{watchlistId}/symbols/{symbol}:
    delete:
      tags: [Watchlists]
      summary: Remove a symbol from a watchlist.
      operationId: deleteWatchlistSymbol
      parameters:
        - $ref: '#/components/parameters/WatchlistId'
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Watchlist updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/quotes/{symbol}:
    get:
      tags: [Quotes]
      summary: Load quote detail for a symbol.
      operationId: getQuoteScreen
      parameters:
        - $ref: '#/components/parameters/Symbol'
      responses:
        '200':
          description: Quote screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteScreenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/charts/{symbol}:
    get:
      tags: [Charts]
      summary: Load chart data for a symbol.
      operationId: getChartScreen
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [1D, 5D, 1M, 3M, 6M, 1Y, 5Y, MAX]
        - name: interval
          in: query
          required: false
          schema:
            type: string
            enum: [1M, 5M, 15M, 1H, 1D, 1W]
        - name: extendedHours
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Chart screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartScreenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/screens/options/{symbol}:
    get:
      tags: [Options]
      summary: Load option chain data for a symbol.
      operationId: getOptionChainScreen
      parameters:
        - $ref: '#/components/parameters/Symbol'
        - name: strikeCount
          in: query
          required: false
          schema:
            type: string
        - name: strategy
          in: query
          required: false
          schema:
            type: string
        - name: range
          in: query
          required: false
          schema:
            type: string
        - name: expMonth
          in: query
          required: false
          schema:
            type: string
        - name: optionType
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Option chain screen data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionChainResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/preview:
    post:
      tags: [Trading]
      summary: Preview an equity or option order.
      operationId: previewOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderIntentRequest'
      responses:
        '200':
          description: Order preview response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPreviewResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/open:
    get:
      tags: [Trading]
      summary: List currently open orders.
      operationId: getOpenOrders
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Open orders response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRecordsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/history:
    get:
      tags: [Trading]
      summary: List historical orders.
      operationId: getOrderHistory
      parameters:
        - name: accountId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Order history response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderRecordsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/submit:
    post:
      tags: [Trading]
      summary: Submit an equity or option order.
      operationId: submitOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderIntentRequest'
      responses:
        '200':
          description: Order submission response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderSubmissionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/{orderId}/cancel:
    post:
      tags: [Trading]
      summary: Cancel an existing order.
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCancelRequest'
      responses:
        '200':
          description: Order cancellation response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCancellationResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/orders/{orderId}/replace:
    post:
      tags: [Trading]
      summary: Replace an existing order.
      operationId: replaceOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderReplaceRequest'
      responses:
        '200':
          description: Order replacement response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderReplacementResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/connections/schwab/oauth/start:
    post:
      tags: [Connections]
      summary: Start the Schwab OAuth flow.
      operationId: startSchwabOAuth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSchwabOAuthRequest'
      responses:
        '200':
          description: OAuth start payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchwabOAuthStartResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/connections/schwab/oauth/complete:
    post:
      tags: [Connections]
      summary: Complete the Schwab OAuth flow.
      operationId: completeSchwabOAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteSchwabOAuthRequest'
      responses:
        '200':
          description: Updated connection state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSummaryResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/connections/plaid/link-token:
    post:
      tags: [Connections]
      summary: Create a Plaid link token.
      operationId: createPlaidLinkToken
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaidLinkTokenRequest'
      responses:
        '200':
          description: Plaid link token payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaidLinkTokenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/connections/plaid/link-complete:
    post:
      tags: [Connections]
      summary: Complete the Plaid link flow.
      operationId: completePlaidLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletePlaidLinkRequest'
      responses:
        '200':
          description: Updated connection state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionSummaryResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /v1/stream/events:
    get:
      tags: [Streaming]
      summary: Subscribe to server-sent stream events.
      operationId: streamEvents
      responses:
        '200':
          description: SSE event stream.
          content:
            text/event-stream:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WatchlistId:
      name: watchlistId
      in: path
      required: true
      schema:
        type: string
    Symbol:
      name: symbol
      in: path
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Meta:
      type: object
      required: [requestId, asOf]
      properties:
        requestId:
          type: string
        asOf:
          type: string
          format: date-time
    ErrorMeta:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
    ErrorDetail:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
        message:
          type: string
        provider:
          $ref: '#/components/schemas/Provider'
        retryable:
          type: boolean
        action:
          type: string
          enum: [none, retry, reconnect, reauth, relink]
    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
        meta:
          $ref: '#/components/schemas/ErrorMeta'
      example:
        error:
          code: INVALID_REQUEST
          message: missing required field 'callback'
          retryable: false
          action: retry
        meta:
          requestId: req_1
    Provider:
      type: string
      enum: [tda, schwab, ibkr, plaid, internal]
    ConnectionStatus:
      type: string
      enum: [connected, connecting, not_connected, degraded, reauth_required]
    DecimalString:
      type: string
      pattern: '^-?[0-9]+(\.[0-9]+)?$'
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          $ref: '#/components/schemas/DecimalString'
        currency:
          type: string
          minLength: 3
          maxLength: 3
    AbsolutePercentChange:
      type: object
      required: [absolute, percent]
      properties:
        absolute:
          $ref: '#/components/schemas/Money'
        percent:
          $ref: '#/components/schemas/DecimalString'
    CapabilityFlags:
      type: object
      additionalProperties:
        type: boolean
    ConnectionSummary:
      type: object
      required: [provider, status, displayName, reauthRequired, capabilities]
      properties:
        provider:
          $ref: '#/components/schemas/Provider'
        status:
          $ref: '#/components/schemas/ConnectionStatus'
        displayName:
          type: string
        lastSyncAt:
          type: string
          format: date-time
          nullable: true
        reauthRequired:
          type: boolean
        capabilities:
          $ref: '#/components/schemas/CapabilityFlags'
    PortfolioSummary:
      type: object
      required: [totalValue, dayChange, cash, buyingPower, holdingsCount]
      properties:
        totalValue:
          $ref: '#/components/schemas/Money'
        dayChange:
          $ref: '#/components/schemas/AbsolutePercentChange'
        cash:
          $ref: '#/components/schemas/Money'
        buyingPower:
          $ref: '#/components/schemas/Money'
        holdingsCount:
          type: integer
          minimum: 0
    HoldingRow:
      type: object
      required: [id, symbol, name, quantity, marketValue, dayChange]
      properties:
        id:
          type: string
        symbol:
          type: string
        name:
          type: string
        quantity:
          $ref: '#/components/schemas/DecimalString'
        marketValue:
          $ref: '#/components/schemas/Money'
        dayChange:
          $ref: '#/components/schemas/AbsolutePercentChange'
    WatchlistSummary:
      type: object
      required: [id, name, instrumentCount]
      properties:
        id:
          type: string
        name:
          type: string
        instrumentCount:
          type: integer
          minimum: 0
    WatchlistRow:
      type: object
      required: [id, symbol, name, lastPrice, dayChange, updatedAt]
      properties:
        id:
          type: string
        symbol:
          type: string
        name:
          type: string
        lastPrice:
          $ref: '#/components/schemas/Money'
        dayChange:
          $ref: '#/components/schemas/AbsolutePercentChange'
        bid:
          $ref: '#/components/schemas/Money'
        ask:
          $ref: '#/components/schemas/Money'
        updatedAt:
          type: string
          format: date-time
    Instrument:
      type: object
      required: [symbol, name, assetType]
      properties:
        symbol:
          type: string
        name:
          type: string
        assetType:
          type: string
          enum: [equity, option, etf, fund, forex, crypto, future, bond, other]
        primaryExchange:
          type: string
          nullable: true
    QuoteSnapshot:
      type: object
      required: [lastPrice, previousClose, volume, updatedAt]
      properties:
        lastPrice:
          $ref: '#/components/schemas/Money'
        bid:
          $ref: '#/components/schemas/Money'
        ask:
          $ref: '#/components/schemas/Money'
        open:
          $ref: '#/components/schemas/Money'
        high:
          $ref: '#/components/schemas/Money'
        low:
          $ref: '#/components/schemas/Money'
        previousClose:
          $ref: '#/components/schemas/Money'
        volume:
          type: string
        updatedAt:
          type: string
          format: date-time
    PositionSummary:
      type: object
      properties:
        quantity:
          $ref: '#/components/schemas/DecimalString'
        marketValue:
          $ref: '#/components/schemas/Money'
        costBasis:
          $ref: '#/components/schemas/Money'
        unrealizedGain:
          $ref: '#/components/schemas/Money'
    WatchlistMembership:
      type: object
      required: [isSaved, watchlistIds]
      properties:
        isSaved:
          type: boolean
        watchlistIds:
          type: array
          items:
            type: string
    QuoteDetail:
      type: object
      required: [instrument, quote, watchlistMembership]
      properties:
        instrument:
          $ref: '#/components/schemas/Instrument'
        quote:
          $ref: '#/components/schemas/QuoteSnapshot'
        position:
          $ref: '#/components/schemas/PositionSummary'
        watchlistMembership:
          $ref: '#/components/schemas/WatchlistMembership'
    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: string
          format: date-time
        open:
          $ref: '#/components/schemas/DecimalString'
        high:
          $ref: '#/components/schemas/DecimalString'
        low:
          $ref: '#/components/schemas/DecimalString'
        close:
          $ref: '#/components/schemas/DecimalString'
        volume:
          type: string
    ChartSeries:
      type: object
      required: [type, bars]
      properties:
        type:
          type: string
          enum: [candles, line]
        bars:
          type: array
          items:
            $ref: '#/components/schemas/Candle'
    ChartStats:
      type: object
      properties:
        change:
          $ref: '#/components/schemas/AbsolutePercentChange'
    BootstrapData:
      type: object
      required: [session, connections]
      properties:
        session:
          type: object
          required: [environment, featureFlags]
          properties:
            environment:
              type: string
            featureFlags:
              type: object
              additionalProperties:
                type: boolean
        connections:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionSummary'
    BootstrapResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/BootstrapData'
        meta:
          $ref: '#/components/schemas/Meta'
      example:
        data:
          session:
            environment: development
            featureFlags:
              options: false
              banking: false
              streaming: true
              desktopMigration: true
          connections:
            - provider: schwab
              status: not_connected
              displayName: Charles Schwab
              lastSyncAt: ''
              reauthRequired: false
              capabilities:
                portfolio: true
                marketData: true
                options: true
                banking: false
            - provider: plaid
              status: not_connected
              displayName: Plaid
              lastSyncAt: ''
              reauthRequired: false
              capabilities:
                banking: true
                transactions: true
                portfolio: false
        meta:
          requestId: req_1
          asOf: '2026-03-22T18:17:20Z'
    HomeScreenData:
      type: object
      required: [connections, portfolio, topHoldings, watchlists, market]
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionSummary'
        portfolio:
          $ref: '#/components/schemas/PortfolioSummary'
        topHoldings:
          type: array
          items:
            $ref: '#/components/schemas/HoldingRow'
        watchlists:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistSummary'
        market:
          type: object
          required: [session]
          properties:
            session:
              type: string
              enum: [pre_market, open, post_market, closed]
            nextTransitionAt:
              type: string
              format: date-time
              nullable: true
    HomeScreenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/HomeScreenData'
        meta:
          $ref: '#/components/schemas/Meta'
      example:
        data:
          connections:
            - provider: schwab
              status: connected
              displayName: Charles Schwab
              lastSyncAt: '2026-03-22T18:17:47Z'
              reauthRequired: false
              capabilities:
                portfolio: true
                marketData: true
                options: true
                banking: false
          portfolio:
            totalValue:
              amount: '128345.22'
              currency: USD
            dayChange:
              absolute:
                amount: '842.13'
                currency: USD
              percent: '0.66'
            cash:
              amount: '14320.00'
              currency: USD
            buyingPower:
              amount: '28640.00'
              currency: USD
            holdingsCount: 12
          topHoldings:
            - id: holding_aapl
              symbol: AAPL
              name: Apple Inc.
              quantity: '42'
              marketValue:
                amount: '9114.00'
                currency: USD
              dayChange:
                absolute:
                  amount: '54.60'
                  currency: USD
                percent: '0.60'
          watchlists:
            - id: core
              name: Core
              instrumentCount: 12
          market:
            session: open
            nextTransitionAt: '2026-03-22T20:00:00Z'
        meta:
          requestId: req_2
          asOf: '2026-03-22T18:17:47Z'
    AccountPositionRow:
      type: object
      required: [symbol, name, dayProfitLoss, dayProfitLossPercent, averagePrice, marketValue, quantity]
      properties:
        symbol:
          type: string
        name:
          type: string
        dayProfitLoss:
          $ref: '#/components/schemas/Money'
        dayProfitLossPercent:
          $ref: '#/components/schemas/DecimalString'
        averagePrice:
          $ref: '#/components/schemas/Money'
        marketValue:
          $ref: '#/components/schemas/Money'
        quantity:
          $ref: '#/components/schemas/DecimalString'
    AccountDetail:
      type: object
      required: [accountId, cash, netLiquidation, availableFunds, longMarketValue, shortMarketValue, buyingPower, equity, equityPercentage, marginBalance, positions]
      properties:
        accountId:
          type: string
        cash:
          $ref: '#/components/schemas/Money'
        netLiquidation:
          $ref: '#/components/schemas/Money'
        availableFunds:
          $ref: '#/components/schemas/Money'
        longMarketValue:
          $ref: '#/components/schemas/Money'
        shortMarketValue:
          $ref: '#/components/schemas/Money'
        buyingPower:
          $ref: '#/components/schemas/Money'
        equity:
          $ref: '#/components/schemas/Money'
        equityPercentage:
          $ref: '#/components/schemas/DecimalString'
        marginBalance:
          $ref: '#/components/schemas/Money'
        positions:
          type: array
          items:
            $ref: '#/components/schemas/AccountPositionRow'
    AccountScreenResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/AccountDetail'
        meta:
